name: Deploy yumi2 Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "少年你相信光吗"
      - "wrangler.toml"
      - ".github/workflows/deploy-yumi2.yml"
  workflow_run:
    workflows: ["Generate and Obfuscate Worker Script"]
    types: [completed]

concurrency:
  group: deploy-yumi2-worker
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Worker
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      YUMI2_KV_NAMESPACE_ID: ${{ secrets.YUMI2_KV_NAMESPACE_ID }}
      YUMI2_UUID: ${{ secrets.YUMI2_UUID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare Worker bundle
        run: |
          set -euo pipefail
          if [ ! -f "少年你相信光吗" ]; then
            echo "Missing source file: 少年你相信光吗"
            exit 1
          fi
          cp "少年你相信光吗" _worker.js
          cat > wrangler.deploy.toml <<EOF
          name = "yumi2"
          main = "_worker.js"
          compatibility_date = "2025-10-25"
          keep_vars = true

          [[kv_namespaces]]
          binding = "C"
          id = "$YUMI2_KV_NAMESPACE_ID"

          [vars]
          u = "$YUMI2_UUID"

          [observability]
          enabled = true
          head_sampling_rate = 1
          EOF

      - name: Deploy to Cloudflare Workers
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing Cloudflare deployment secrets."
            exit 1
          fi
          if [ -z "$YUMI2_KV_NAMESPACE_ID" ] || [ -z "$YUMI2_UUID" ]; then
            echo "Missing yumi2 binding secrets."
            exit 1
          fi
          npx wrangler@latest deploy --config wrangler.deploy.toml --no-bundle --domain yumi2.chenyudian.us.kg
